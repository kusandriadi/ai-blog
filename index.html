<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a0a">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AI News">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- SEO -->
  <title>AI News - Aggregated Blog Posts from Top AI Companies</title>
  <meta name="description" content="Stay updated with the latest blog posts from Claude, Codex, DeepSeek, Gemma, Kimi, Qwen, OpenClaw, Ollama, Cursor, Perplexity, and xAI. Auto-updated every 6 hours.">
  <meta name="robots" content="index, follow">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="AI News - Blog Aggregator">
  <meta property="og:description" content="Aggregated blog posts from top AI companies. Auto-updated every 6 hours.">
  <meta property="og:image" content="icons/icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="header">
    <div class="header-top">
      <h1><span>AI</span> News</h1>
      <div class="header-actions">
        <button class="btn-icon" id="theme-toggle" title="Toggle theme">&#9728;&#65039;</button>
      </div>
    </div>
    <div class="filters" id="filters"></div>
  </div>

  <!-- Install Banner -->
  <div class="install-banner" id="install-banner">
    <div class="install-banner-text">
      <strong>Install AI News</strong>
      Get instant access from your home screen
    </div>
    <button class="btn-install" id="btn-install">Install</button>
    <button class="btn-dismiss" id="btn-dismiss">&times;</button>
  </div>

  <div class="container">
    <div class="stats" id="stats"></div>
    <div class="post-list" id="posts"></div>
    <div class="empty-state" id="empty" style="display:none">No posts found.</div>
  </div>

  <div class="footer">
    Aggregated from Claude, Codex, DeepSeek, Gemma, Kimi, Qwen, OpenClaw, Ollama, Cursor, Perplexity, xAI.
    <br>Auto-updated every 6 hours.
  </div>

  <!-- Post Detail Modal -->
  <div class="post-modal" id="post-modal">
    <div class="modal-content">
      <div class="modal-header">
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <h2 class="modal-title" id="modal-title"></h2>
      <div class="modal-meta" id="modal-meta"></div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
